<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FundAgent</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", "Noto Sans SC", sans-serif;
    background: #f0f2f5; color: #1a1a2e;
    display: flex; flex-direction: column; height: 100vh;
  }

  .header {
    background: #fff; padding: 12px 20px;
    border-bottom: 1px solid #e0e0e0;
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
  }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header .model-tag {
    font-size: 12px; color: #888; margin-left: auto;
  }

  .agent-switcher {
    display: flex; gap: 4px;
    background: #f0f2f5; padding: 3px;
    border-radius: 8px;
  }
  .agent-btn {
    border: none; padding: 6px 16px; border-radius: 6px;
    font-size: 13px; font-weight: 500; cursor: pointer;
    background: transparent; color: #666;
    transition: all .15s;
  }
  .agent-btn:hover { color: #333; }
  .agent-btn.active {
    background: #fff; color: #4f46e5;
    box-shadow: 0 1px 3px rgba(0,0,0,.12);
  }

  .chat-area {
    flex: 1; overflow-y: auto; padding: 20px;
    display: none;
    flex-direction: column; gap: 16px;
  }
  .chat-area.active { display: flex; }

  .message {
    max-width: 85%; padding: 14px 18px; border-radius: 12px;
    line-height: 1.7; font-size: 14px; white-space: pre-wrap;
    position: relative;
  }
  .message.user {
    background: #4f46e5; color: #fff; align-self: flex-end;
    border-bottom-right-radius: 4px;
  }
  .message.assistant {
    background: #fff; color: #1a1a2e; align-self: flex-start;
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 3px rgba(0,0,0,.08);
  }
  .message.assistant .label {
    font-size: 12px; color: #4f46e5; font-weight: 500; margin-bottom: 6px;
  }

  .diff-toggle {
    font-size: 12px; color: #4f46e5; cursor: pointer; margin-top: 8px;
    user-select: none;
  }
  .diff-toggle:hover { text-decoration: underline; }
  .diff-table-wrap { display: none; margin-top: 8px; }
  .diff-table-wrap.open { display: block; }
  .diff-table {
    width: 100%; border-collapse: collapse; font-size: 12px;
    background: #f8f8fc; border-radius: 6px;
  }
  .diff-table th {
    text-align: left; padding: 6px 8px; background: #eef2ff;
    font-weight: 500; border-bottom: 1px solid #ddd;
  }
  .diff-table td {
    padding: 6px 8px; border-bottom: 1px solid #eee; vertical-align: top;
  }

  .input-area {
    background: #fff; border-top: 1px solid #e0e0e0;
    padding: 12px 20px; flex-shrink: 0;
  }
  .input-row {
    display: flex; gap: 10px; align-items: flex-start;
  }
  .input-text-wrap {
    flex: 1; position: relative;
  }
  .input-text-wrap textarea {
    width: 100%; min-height: 52px; max-height: 150px;
    padding: 12px; border: 1px solid #ddd; border-radius: 8px;
    font-size: 14px; line-height: 1.5; resize: none;
    font-family: inherit;
    transition: border-color .15s;
  }
  .input-text-wrap textarea:focus {
    outline: none; border-color: #4f46e5;
    box-shadow: 0 0 0 2px rgba(79,70,229,.1);
  }

  .btn { border: none; border-radius: 8px; cursor: pointer; font-weight: 500; }
  .btn-send {
    padding: 12px 24px; background: #4f46e5; color: #fff;
    font-size: 14px; min-width: 72px;
  }
  .btn-send:hover { background: #4338ca; }
  .btn-send:disabled { background: #a5b4fc; cursor: not-allowed; }

  .btn-clear {
    padding: 6px 14px; background: #f0f0f0; color: #666; font-size: 12px;
  }
  .btn-clear:hover { background: #e0e0e0; }

  .bottom-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 6px;
  }
  .hint { font-size: 12px; color: #aaa; }
  .loading {
    font-size: 13px; color: #888;
    display: none; align-items: center; gap: 6px;
  }
  .loading.show { display: flex; }
  .spinner {
    width: 14px; height: 14px; border: 2px solid #ddd;
    border-top-color: #4f46e5; border-radius: 50%;
    animation: spin .6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .chat-area.busy .bg-search-tip {
    display: block;
  }
  .bg-search-tip {
    display: none;
    text-align: center;
    color: #888;
    font-size: 12px;
    padding: 8px;
    background: #fffbe6;
    border-radius: 8px;
    border: 1px solid #ffe58f;
    margin-bottom: 4px;
  }

  .welcome {
    text-align: center; color: #999; margin-top: 60px;
  }
  .welcome .icon { font-size: 48px; margin-bottom: 12px; }
  .welcome p { font-size: 14px; line-height: 1.6; }
</style>
</head>
<body>

<div class="header">
  <h1>📄 FundAgent</h1>
  <div class="agent-switcher" id="agentSwitcher">
    <button class="agent-btn" data-agent="bg">研究背景 Agent</button>
    <button class="agent-btn" data-agent="draft">初稿 Agent</button>
    <button class="agent-btn active" data-agent="revise">段落修改 Agent</button>
  </div>
  <span class="model-tag" id="modelTag"></span>
</div>

<!-- 3 independent chat areas -->
<div class="chat-area" id="chatArea-bg">
  <div class="bg-search-tip" id="bgSearchTip">🔍 正在搜索文献并生成段落，可能需要 30-60 秒，请耐心等待...</div>
  <div class="welcome" id="welcome-bg">
    <div class="icon">🔬</div>
    <p>研究背景 Agent<br>
      <span style="font-size:13px;color:#bbb">自动搜索文献，撰写研究背景段落</span>
    </p>
  </div>
</div>
<div class="chat-area" id="chatArea-draft">
  <div class="welcome" id="welcome-draft">
    <div class="icon">📝</div>
    <p>初稿 Agent<br>
      <span style="font-size:13px;color:#bbb">撰写完整基金初稿</span>
    </p>
  </div>
</div>
<div class="chat-area active" id="chatArea-revise">
  <div class="welcome" id="welcome-revise">
    <div class="icon">✏️</div>
    <p>段落修改 Agent<br>
      <span style="font-size:13px;color:#bbb">对已有段落进行修改润色</span>
    </p>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <div class="input-text-wrap">
      <textarea id="msgInput" placeholder="输入你的需求…（Shift+Enter 换行）" rows="2"></textarea>
    </div>
    <button class="btn btn-send" id="sendBtn">发送</button>
  </div>
  <div class="bottom-row">
    <div class="loading" id="loading"><span class="spinner"></span>处理中...</div>
    <div style="display:flex; gap:8px; align-items:center;">
      <button class="btn btn-clear" id="clearBtn">清空对话</button>
      <span class="hint">Shift+Enter 换行</span>
    </div>
  </div>
</div>

<script>
const chatAreas = {
  bg: document.getElementById('chatArea-bg'),
  draft: document.getElementById('chatArea-draft'),
  revise: document.getElementById('chatArea-revise'),
};
const welcomeEls = {
  bg: document.getElementById('welcome-bg'),
  draft: document.getElementById('welcome-draft'),
  revise: document.getElementById('welcome-revise'),
};
const bgSearchTip = document.getElementById('bgSearchTip');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
const clearBtn = document.getElementById('clearBtn');
const loading = document.getElementById('loading');
const modelTag = document.getElementById('modelTag');

let currentAgent = 'revise';

function getChatArea() { return chatAreas[currentAgent]; }
function getWelcome() { return welcomeEls[currentAgent]; }

// ── Agent 切换 ──
document.getElementById('agentSwitcher').addEventListener('click', (e) => {
  const btn = e.target.closest('.agent-btn');
  if (!btn) return;
  const agent = btn.dataset.agent;
  if (agent === currentAgent) return;

  document.querySelectorAll('.agent-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  // Switch visible chat area
  Object.values(chatAreas).forEach(el => el.classList.remove('active'));
  chatAreas[agent].classList.add('active');

  currentAgent = agent;

  const hints = {
    bg: '输入研究主题，如：面向大模型的xxx方法研究，参考5篇文献…',
    draft: '描述你的基金类型、主题和研究方向…',
    revise: '粘贴段落并说明修改意见…',
  };
  msgInput.placeholder = hints[agent] || '';
});

msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 150) + 'px';
});

msgInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

sendBtn.addEventListener('click', send);
clearBtn.addEventListener('click', clearChat);

async function send() {
  const text = msgInput.value.trim();
  if (!text) return;

  appendMessage('user', text);
  msgInput.value = '';
  msgInput.style.height = 'auto';
  setLoading(true);
  bgSearchTip.style.display = currentAgent === 'bg' ? 'block' : 'none';

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, agent: currentAgent })
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || `请求失败 (${res.status})`);
    }
    const data = await res.json();

    let html = '';
    const output = (data.output || '').trim();
    html += output || '(无返回)';

    if (data.changes && data.changes.length) {
      let tblHtml = '<div class="diff-toggle" onclick="toggleDiff(this)">📋 查看修改说明 ▼</div>';
      tblHtml += '<div class="diff-table-wrap"><table class="diff-table">';
      tblHtml += '<thead><tr><th style="width:35%">原文</th><th style="width:35%">修改为</th><th style="width:30%">原因</th></tr></thead><tbody>';
      data.changes.forEach(c => {
        tblHtml += `<tr><td>${esc(c.original || '')}</td><td>${esc(c.modified || '')}</td><td>${esc(c.reason || '')}</td></tr>`;
      });
      tblHtml += '</tbody></table></div>';
      html += tblHtml;
    }

    appendMessage('assistant', html, true);
    if (data.model) modelTag.textContent = data.model;
    bgSearchTip.style.display = 'none';
  } catch (e) {
    appendMessage('assistant', `❌ ${e.message}`, false);
  } finally {
    setLoading(false);
  }
}

function appendMessage(role, content, isHtml = false) {
  const area = getChatArea();
  const wel = getWelcome();
  wel.style.display = 'none';

  const div = document.createElement('div');
  div.className = `message ${role}`;
  if (role === 'assistant') {
    const label = document.createElement('div');
    label.className = 'label';
    const labels = { bg: '🔬 研究背景 Agent', draft: '📝 初稿 Agent', revise: '✏️ 段落修改 Agent' };
    label.textContent = labels[currentAgent] || 'FundAgent';
    div.appendChild(label);
  }
  if (isHtml) {
    const inner = document.createElement('div');
    inner.innerHTML = content;
    div.appendChild(inner);
  } else {
    const inner = document.createElement('div');
    inner.textContent = content;
    div.appendChild(inner);
  }
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function toggleDiff(el) {
  const wrap = el.nextElementSibling;
  if (wrap) {
    wrap.classList.toggle('open');
    el.textContent = wrap.classList.contains('open')
      ? '📋 收起修改说明 ▲'
      : '📋 查看修改说明 ▼';
  }
}

async function clearChat() {
  setLoading(true);
  try {
    await fetch('/reset?agent=' + currentAgent, { method: 'POST' });
  } catch (_) {}
  const area = getChatArea();
  const wel = getWelcome();
  area.innerHTML = wel.outerHTML;
  welcomeEls[currentAgent] = document.getElementById('welcome-' + currentAgent);
  setLoading(false);
}

function setLoading(v) { loading.classList.toggle('show', v); sendBtn.disabled = v; }

fetch('/agents').then(r => r.json()).then(d => {
  if (d.current_model) modelTag.textContent = d.current_model;
}).catch(() => {});

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
